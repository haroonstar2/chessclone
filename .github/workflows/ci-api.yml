name: API CI Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/core-api/**"
      - "package.json"
      - "package-lock.json"

jobs:
  build-and-test-ts:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: testdb
      DATABASE_URL: postgresql://testuser:testpassword@127.0.0.1:5432/testdb?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.12.0"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate -w core-api

      - name: Apply Prisma migrations
        run: npm run prisma:deploy -w core-api

      - name: Build workspaces
        run: npm run build --workspaces

      - name: Run API tests
        run: npm test -w core-api --if-present
        env:
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_RESET_SECRET: ${{ secrets.JWT_RESET_SECRET }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_SECURE: ${{ secrets.EMAIL_SECURE }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RESET_PASSWORD_URL: ${{ secrets.EMAIL_RESET_PASSWORD_URL }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
