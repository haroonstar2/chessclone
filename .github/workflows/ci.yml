name: CI Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test-ts:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.12.0"

      - name: Install dependencies
        run: npm ci

      - name: Start Postgres and Redis Docker containers
        run: docker compose up -d
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

      - name: Generate Prisma client
        run: npm run prisma:generate -w core-api

      - name: Apply Prisma migrations
        run: npm run prisma:deploy -w core-api

      - name: Build workspaces
        run: npm run build --workspaces

      - name: Run API tests
        run: npm test -w core-api --if-present
        env:
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_RESET_SECRET: ${{ secrets.JWT_RESET_SECRET }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_SECURE: ${{ secrets.EMAIL_SECURE }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RESET_PASSWORD_URL: ${{ secrets.EMAIL_RESET_PASSWORD_URL }}
          NODE_ENV: ${{ secrets.NODE_ENV }}

  build-go:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/game-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26.4"

      - name: Build Go project
        run: go build -v ./...
